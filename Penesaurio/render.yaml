services:
  - type: web
    name: penesaurio
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: PENESAURIO_DEBUG
        value: "0"
